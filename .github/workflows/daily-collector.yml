name: Daily Project Lead Collector

on:
  schedule:
    # GitHub Actions cron uses UTC. 00:00 UTC = 08:00 Beijing time.
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    env:
      RUN_TZ: Asia/Shanghai
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Collect project leads
        run: python main.py --sources sources.csv --output-dir reports

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: project-leads-report
          path: reports/

      - name: Commit generated reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports
          if ! git diff --cached --quiet; then
            git commit -m "chore: add daily project leads report"
            git push
          fi
